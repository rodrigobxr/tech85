<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rodrigão — Copa do Mundo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
// Configuração do Tailwind CSS
tailwind.config = {
theme: {
  extend: {
    colors: {
      page: '#0A0A0A', card: '#141414', elevated: '#1C1C1C',
      gold: '#F5C842', live: '#2ECC71', danger: '#E74C3C'
    },
    fontFamily: { inter: ['Inter','sans-serif'] }
  }
}
}
</script>
<style>
/* Reset básico e fontes */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#F0F0F0;font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#141414}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#F5C842}

/* Animações */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 1.5s ease-in-out infinite}
.fadein{animation:fadeUp .3s ease forwards}
.loader{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid #2a2a2a;border-top-color:#F5C842;animation:spin .8s linear infinite}

/* Topbar */
#topbar{height:52px;background:#0A0A0A;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:100;gap:12px}

/* Layout Principal */
#app{display:flex;flex:1;overflow:hidden}

/* Sidebar */
#sidebar{width:210px;background:#0D0D0D;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-profile{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-avatar{width:46px;height:46px;border-radius:50%;background:#1a1a1a;border:2px solid #F5C842;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#F5C842;margin-bottom:8px;flex-shrink:0}
.sb-name{font-size:15px;font-weight:900;color:#F5C842;letter-spacing:-.3px}
.sb-sub{font-size:9px;color:#888;font-weight:500;margin-top:1px}
.sb-nav{padding:8px 0;flex:1}
.sb-sec{font-size:8px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1.5px;padding:8px 14px 3px}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 14px;background:transparent;border:none;cursor:pointer;color:#777;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;text-align:left;transition:all .15s;position:relative}
.sb-btn svg{width:14px;height:14px;flex-shrink:0;stroke:#777;transition:stroke .15s}
.sb-btn:hover{background:rgba(255,255,255,.03);color:#F0F0F0}
.sb-btn:hover svg{stroke:#F0F0F0}
.sb-btn.active{background:rgba(245,200,66,.08);color:#F5C842;border-right:2px solid #F5C842}
.sb-btn.active svg{stroke:#F5C842}
.sb-badge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(46,204,113,.15);color:#2ECC71}
.sb-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);font-size:9px;color:#333;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:1px}

/* Conteúdo Principal */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tabsbar{display:flex;background:#0D0D0D;border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
#tabsbar::-webkit-scrollbar{height:0}
.tab{padding:11px 15px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#555;white-space:nowrap;letter-spacing:.06em;transition:all .15s;flex-shrink:0}
.tab:hover{color:#F0F0F0}
.tab.active{color:#F5C842;border-bottom-color:#F5C842}
#panels{flex:1;overflow-y:auto}
.panel{display:none;padding:20px 18px;animation:fadeUp .3s ease}
.panel.active{display:block}
.inner{max-width:1080px;margin:0 auto}

/* Títulos de Seção */
.sech{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sech h2{font-size:16px;font-weight:700;color:#F5C842;white-space:nowrap}
.sech .line{flex:1;height:1px;background:linear-gradient(90deg,rgba(245,200,66,.2),transparent)}

/* Cards Genéricos */
.card{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:12px;transition:border-color .2s}
.card:hover{border-color:rgba(245,200,66,.12)}

/* Stat Cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;transition:border-color .2s}
.stat:hover{border-color:rgba(245,200,66,.15)}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-val{font-size:26px;font-weight:900;color:#F0F0F0;line-height:1;margin-bottom:3px}
.stat-val.green{color:#2ECC71}
.stat-lbl{font-size:9px;font-weight:700;color:#F5C842;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1px}
.stat-sub{font-size:10px;color:#666}

/* Jogo em Destaque */
.feat{background:linear-gradient(135deg,#141414,#1C1C1C);border:1px solid rgba(245,200,66,.15);border-radius:14px;padding:22px;margin-bottom:18px}
.feat-lbl{font-size:9px;font-weight:700;color:#F5C842;letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px}
.feat-body{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.feat-team{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;min-width:80px}
.feat-name{font-size:14px;font-weight:600;color:#F0F0F0;text-align:center}
.feat-mid{text-align:center}
.feat-score{font-size:52px;font-weight:900;color:#F0F0F0;line-height:1;letter-spacing:-3px}
.feat-ns{font-size:26px;font-weight:800;color:#F5C842}
.feat-meta{font-size:10px;color:#888;margin-top:5px}

/* Item de Partida (Mini) */
.mi{background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:all .15s}
.mi:hover{border-color:rgba(245,200,66,.15);background:#1A1A1A}
.mi.live-card{border-color:rgba(46,204,113,.2);box-shadow:0 0 12px rgba(46,204,113,.05)}
.mi-team{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.mi-team.away{flex-direction:row-reverse;justify-content:flex-end}
.mi-name{font-size:12px;font-weight:500;color:#F0F0F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-mid{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:75px;flex-shrink:0}
.mi-score{font-size:17px;font-weight:800;color:#F0F0F0}
.mi-hour{font-size:12px;font-weight:700;color:#F5C842}

/* Badges de Status */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.b-ns{background:rgba(255,255,255,.05);color:#666;border:1px solid rgba(255,255,255,.07)}
.b-live{background:rgba(46,204,113,.1);color:#2ECC71;border:1px solid rgba(46,204,113,.2)}
.b-ft{background:transparent;color:#444;border:1px solid rgba(255,255,255,.05)}
.b-dot{width:5px;height:5px;border-radius:50%;background:#2ECC71;flex-shrink:0}

/* Card de Jogo Premium (Aba Hoje) */
.pmc{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;transition:border-color .2s;margin-bottom:12px}
.pmc:hover{border-color:rgba(245,200,66,.15)}
.pmc.live{border-color:rgba(46,204,113,.25);box-shadow:0 0 20px rgba(46,204,113,.06)}
.pmc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.pmc-grp{font-size:10px;font-weight:700;color:#888;letter-spacing:.08em}
.pmc-body{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pmc-team{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1}
.pmc-name{font-size:13px;font-weight:600;color:#F0F0F0;text-align:center}
.pmc-center{text-align:center;min-width:110px}
.pmc-score{font-size:46px;font-weight:900;color:#F0F0F0;line-height:1;letter-spacing:-2px}
.pmc-hour{font-size:22px;font-weight:800;color:#F5C842}
.pmc-tv{padding:10px 0 0;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:5px;flex-wrap:wrap;margin-top:12px}
.tv-chip{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.04);color:#888;border:1px solid rgba(255,255,255,.07)}
.tv-chip.gold{background:rgba(245,200,66,.08);color:#F5C842;border-color:rgba(245,200,66,.2)}

/* Grupos */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.gc{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;transition:border-color .2s}
.gc:hover{border-color:rgba(245,200,66,.15)}
.gc-title{font-size:13px;font-weight:800;color:#F5C842;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.05)}
.gc-team{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px;font-weight:500;color:#F0F0F0}
.gc-team:last-child{border-bottom:none}

/* Classificação */
.std-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.std-card{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
.std-hd{background:rgba(245,200,66,.05);padding:9px 14px;font-size:10px;font-weight:700;color:#F5C842;border-bottom:1px solid rgba(255,255,255,.05);letter-spacing:.08em;text-transform:uppercase}
.std-tbl{width:100%;border-collapse:collapse}
.std-tbl th{font-size:8px;font-weight:700;color:#555;padding:6px 8px;text-align:center;letter-spacing:.06em;text-transform:uppercase}
.std-tbl th:nth-child(2){text-align:left}
.std-tbl td{font-size:10px;padding:7px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.std-tbl td:nth-child(2){text-align:left;font-size:11px}
.std-tbl tr:last-child td{border-bottom:none}
.std-tbl tr.p1{background:rgba(245,200,66,.04)}
.std-tbl tr.p2{background:rgba(46,204,113,.03)}
.pos{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:9px;font-weight:700}
.pos.p1{background:#F5C842;color:#0A0A0A}
.pos.p2{background:rgba(46,204,113,.2);color:#2ECC71}
.pos.px{color:#555}
.pts-val{font-size:11px;font-weight:800;color:#F5C842}
.pts-dim{font-size:11px;font-weight:600;color:#555}

/* Artilheiros */
.sclist{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
.scrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.scrow:last-child{border-bottom:none}
.scrow:hover{background:#1A1A1A}
.sc-pos{font-size:11px;font-weight:700;min-width:18px;text-align:center;color:#888}
.sc-pos.top{color:#F5C842}
.sc-name{flex:1;font-size:13px;font-weight:500;color:#F0F0F0}
.sc-g{font-size:16px;font-weight:800;color:#F5C842}

/* Notícias */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:14px}
.nc{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.nc:hover{border-color:rgba(245,200,66,.2);transform:translateY(-2px)}
.nc-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
.nc-title{font-size:13px;font-weight:700;color:#F0F0F0;margin-bottom:6px;line-height:1.4}
.nc-body{font-size:11px;color:#888;line-height:1.6}

/* Admin Panel (Apenas para exibir status da API, inputs desabilitados) */
.adm-row{background:#141414;border:1px solid rgba(255,255,255,.07);border-left:3px solid #F5C842;border-radius:10px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;transition:border-color .15s}
.adm-row.is-live{border-left-color:#2ECC71;border-color:rgba(46,204,113,.15)}
.adm-teams{font-size:12px;font-weight:600;color:#F0F0F0;flex:1;min-width:120px}
.adm-meta{font-size:10px;color:#888;white-space:nowrap}
.adm-in,.adm-sel{background:#111;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:6px 8px;color:#F0F0F0;font-family:'Inter',sans-serif;font-size:11px;outline:none;cursor:not-allowed;transition:border-color .15s}
.adm-in.score{width:52px;font-size:13px;font-weight:800;color:#F5C842;text-align:center}
.adm-in.wide{width:72px;text-align:left}
.adm-lbl{font-size:9px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.adm-btn-sync{background:#F5C842;color:#0A0A0A;border:none;padding:8px 16px;font-weight:700;border-radius:8px;cursor:pointer;font-size:12px;transition:background .2s}
.adm-btn-sync:hover{background:#E8B800}

/* Separadores de Data */
.date-sep{display:flex;align-items:center;gap:10px;margin:16px 0 8px}
.date-sep span{font-size:10px;font-weight:700;color:#F5C842;white-space:nowrap;text-transform:uppercase;letter-spacing:.08em}
.date-sep .dsline{flex:1;height:1px;background:rgba(245,200,66,.15)}

/* Toast de Notificação */
#toast{position:fixed;bottom:22px;right:22px;z-index:999;background:#1C1C1C;border:1px solid rgba(46,204,113,.3);color:#2ECC71;padding:11px 18px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

/* Bandeiras */
.flag{border-radius:3px;object-fit:cover;flex-shrink:0;display:inline-block}
.flag-sm{width:18px;height:13px}
.flag-md{width:26px;height:19px}
.flag-lg{width:42px;height:30px}
.flag-fb{display:inline-flex;align-items:center;justify-content:center;background:#2a2a2a;border-radius:3px;color:#555;font-size:9px;font-weight:700;flex-shrink:0}

/* Badge Ao Vivo no Header */
.live-hd{display:flex;align-items:center;gap:5px;background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);border-radius:20px;padding:4px 10px}
.live-hd span{font-size:10px;font-weight:700;color:#2ECC71}
.live-hdot{width:6px;height:6px;border-radius:50%;background:#2ECC71;flex-shrink:0}

/* Grids e Layouts Específicos */
.painel-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Responsividade */
@media(max-width:820px){
#sidebar{display:none}
.stat-grid{grid-template-columns:1fr 1fr}
.std-grid{grid-template-columns:1fr}
.groups-grid{grid-template-columns:repeat(2,1fr)}
.painel-grid{grid-template-columns:1fr}
.feat-score{font-size:38px}
.pmc-score{font-size:36px}
}
@media(max-width:520px){
.groups-grid{grid-template-columns:1fr}
.stat-grid{grid-template-columns:1fr 1fr}
.news-grid{grid-template-columns:1fr}
#topbar{padding:0 12px}
.panel{padding:14px 12px}
.pmc-body{flex-wrap:wrap;justify-content:center}
.pmc-center{order:-1;width:100%}
}
select option{background:#141414;color:#F0F0F0}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
<div style="display:flex;align-items:center;gap:10px">
  <div style="width:36px;height:36px;border-radius:50%;background:#1a1a1a;border:2px solid #F5C842;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#F5C842;flex-shrink:0">R</div>
  <div>
    <div style="font-size:14px;font-weight:900;color:#F5C842;letter-spacing:-.3px;line-height:1.1">RODRIGÃO</div>
    <div style="font-size:9px;color:#888;font-weight:500">Copa do Mundo 2026</div>
  </div>
  <span style="background:rgba(245,200,66,.1);color:#F5C842;border:1px solid rgba(245,200,66,.2);border-radius:4px;font-size:9px;font-weight:700;padding:2px 7px;margin-left:4px">FIFA 2026</span>
</div>
<div style="display:flex;align-items:center;gap:10px">
  <div id="live-hd-wrap" style="display:none" class="live-hd">
    <div class="live-hdot pulse"></div>
    <span id="live-hd-count">0 AO VIVO</span>
  </div>
  <div style="background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:4px 11px;text-align:center">
    <div style="font-size:8px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.06em">Sistema</div>
    <div style="font-size:12px;font-weight:700;color:#F5C842" id="hdr-date">--/--</div>
  </div>
</div>
</div>

<!-- APP -->
<div id="app">

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sb-profile">
    <div class="sb-avatar">R</div>
    <div class="sb-name">RODRIGÃO</div>
    <div class="sb-sub">A VOZ DO ESPORTE OFICIAL</div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">Navegação</div>
    <button class="sb-btn active" data-nav="hoje">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Jogos de Hoje <span class="sb-badge" id="sb-hoje-count">0</span>
    </button>
    <button class="sb-btn" data-nav="painel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Painel Geral
    </button>
    <button class="sb-btn" data-nav="jogos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Todos os Jogos
    </button>
    <div class="sb-sec">Competição</div>
    <button class="sb-btn" data-nav="grupos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Grupos
    </button>
    <button class="sb-btn" data-nav="classif">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Classificação
    </button>
    <button class="sb-btn" data-nav="artilharia">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/></svg>
      Artilharia
    </button>
    <div class="sb-sec">Estúdio</div>
    <button class="sb-btn" data-nav="admin">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
      <span style="color:#F5C842">Controle Manual</span>
    </button>
  </div>
  <div class="sb-footer">sistema autônomo · rodrigão</div>
</nav>

<!-- CONTENT -->
<div id="content">
  <div id="tabsbar">
    <button class="tab active" data-nav="hoje">HOJE</button>
    <button class="tab" data-nav="painel">PAINEL</button>
    <button class="tab" data-nav="jogos">JOGOS</button>
    <button class="tab" data-nav="grupos">GRUPOS</button>
    <button class="tab" data-nav="classif">CLASSIFICAÇÃO</button>
    <button class="tab" data-nav="artilharia">ARTILHARIA</button>
    <button class="tab" data-nav="admin">⚙ ADMIN</button>

async function fetchApiData(endpoint, params = {}) {
// Se a API Key não estiver configurada, usa os dados simulados
if (!API_KEY) {
  showToast("API Key não configurada. Usando dados simulados.", 'warning');
  throw new Error("API Key não configurada.");
}

const urlParams = new URLSearchParams({
  league: LEAGUE_ID,
  season: SEASON,
  ...params
});
const url = `${API_BASE_URL}${endpoint}?${urlParams.toString()}`;

try {
  const response = await fetch(url, {
    headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'v3.football.api-sports.io' }
  });
  if (!response.ok) {
    const errorData = await response.json();
    throw new Error(`Erro na API: ${response.status} - ${errorData.errors ? JSON.stringify(errorData.errors) : response.statusText}`);
  }
  const data = await response.json();
  if (data.errors && data.errors.length > 0) {
      throw new Error(`Erro(s) da API: ${JSON.stringify(data.errors)}`);
  }
  return data.response;
} catch (error) {
  console.error(`Falha ao buscar ${endpoint}:`, error.message);
  showToast(`Erro: ${error.message}. Dados podem estar desatualizados.`, 'danger');
  throw error; // Propaga o erro para o catch de renderPanelContent
}
}

// Função para buscar e processar dados de partidas
async function getMatches(date = null) {
let params = {};
if (date) params.date = date; // date deve ser no formato YYYY-MM-DD

try {
  const data = await fetchApiData('fixtures', params);
  if (!data || data.length === 0) {
      console.warn("Nenhum dado de partidas retornado da API. Usando dados simulados.");
      return FALLBACK_RESULTS;
  }

  return data.map(fixture => {
    const homeTeamName = fixture.teams.home.name;
    const awayTeamName = fixture.teams.away.name;
    const fixtureDate = new Date(fixture.fixture.date);

    let status = 'NS'; // Not Started
    let time = '';

    switch (fixture.fixture.status.short) {
        case 'FT': status = 'FT'; time = 'FIM'; break;
        case 'HT': status = 'LIVE'; time = 'HT'; break; // Half Time
        case '1H': case '2H': case 'ET': case 'P': case 'BT': case 'LIVE':
            status = 'LIVE'; time = fixture.fixture.status.elapsed ? `${fixture.fixture.status.elapsed}'` : 'LIVE'; break;
        case 'CANC': case 'POST': case 'INT': status = 'NS'; time = 'ADIADO'; break; // Cancelado/Postergado
        default: status = 'NS'; time = `${String(fixtureDate.getHours()).padStart(2, '0')}h${String(fixtureDate.getMinutes()).padStart(2, '0')}`; break;
    }

    // Tenta encontrar o grupo pelo nome do time (adaptando GROUPS_DATA se necessário)
    let groupLetter = 'N/A';
    for (const [letter, teams] of Object.entries(GROUPS_DATA)) {
        if (teams.includes(homeTeamName) || teams.includes(awayTeamName)) {
            groupLetter = letter;
            break;
        }
    }

    return {
      id: fixture.fixture.id,
      d: `${String(fixtureDate.getDate()).padStart(2, '0')}/${String(fixtureDate.getMonth() + 1).padStart(2, '0')}`,
      g: groupLetter,
      h: homeTeamName,
      a: awayTeamName,
      hs: fixture.goals.home,
      as: fixture.goals.away,
      status: status,
      time: time,
      home_iso: getFlagCode(homeTeamName) || '',
      away_iso: getFlagCode(awayTeamName) || ''
    };
  }).sort((a,b) => { // Ordena por data e depois por hora
    const dateA = new Date(`2026/${a.d.split('/')[1]}/${a.d.split('/')[0]} ${a.time.replace('h',':')}`);
    const dateB = new Date(`2026/${b.d.split('/')[1]}/${b.d.split('/')[0]} ${b.time.replace('h',':')}`);
    return dateA - dateB;
  });
} catch (error) {
  console.error("Erro ao buscar partidas da API, usando fallback:", error);
  return FALLBACK_RESULTS;
}
}

// Função para buscar e processar dados de classificação
async function getStandings() {
try {
  const data = await fetchApiData('standings', {});
  if (!data || data.length === 0) {
      console.warn("Nenhum dado de classificação retornado da API. Usando dados simulados.");
      // Gerar standings a partir de FALLBACK_RESULTS se necessário
      return generateStandingsFromMatches(FALLBACK_RESULTS);
  }
  
  return data.map(standing => {
    const groupName = standing.league.name; // Ex: 'World Cup Group A'
    const groupLetter = groupName.split(' ').pop(); // Pega 'A' do final
    
    return {
        group: groupLetter,
        table: standing.league.standings[0].map(team => ({ // [0] porque é sempre uma tabela por grupo
            name: team.team.name,
            rank: team.rank,
            logo: team.team.logo,
            pts: team.points,
            j: team.all.played,
            v: team.all.win,
            e: team.all.draw,
            d: team.all.lose,
            gf: team.all.goals.for,
            gc: team.all.goals.against,
            sg: team.goalsDiff,
            form: team.form
        }))
    };
  });
} catch (error) {
  console.error("Erro ao buscar classificações da API, usando fallback:", error);
  return generateStandingsFromMatches(FALLBACK_RESULTS);
}
}

// Função para gerar classificações a partir dos matches (fallback manual)
function generateStandingsFromMatches(matches) {
  const allStandings = {};

  Object.keys(GROUPS_DATA).forEach(groupLetter => {
      const groupTeams = GROUPS_DATA[groupLetter];
      const teamStats = {};

      groupTeams.forEach(teamName => {
          teamStats[teamName] = { name: teamName, rank: 0, pts: 0, j: 0, v: 0, e: 0, d: 0, gf: 0, gc: 0, sg: 0 };
      });

      matches.filter(m => m.g === groupLetter && m.status === 'FT').forEach(m => {
          const h = m.h;
          const a = m.a;
          const hs = parseInt(m.hs);
          const as = parseInt(m.as);

          if (teamStats[h] && teamStats[a]) {
              teamStats[h].j++;
              teamStats[a].j++;
              teamStats[h].gf += hs;
              teamStats[h].gc += as;
              teamStats[a].gf += as;
              teamStats[a].gc += hs;

              if (hs > as) {
                  teamStats[h].v++;
                  teamStats[h].pts += 3;
                  teamStats[a].d++;
              } else if (as > hs) {
                  teamStats[a].v++;
                  teamStats[a].pts += 3;
                  teamStats[h].d++;
              } else {
                  teamStats[h].e++;
                  teamStats[h].pts += 1;
                  teamStats[a].e++;
                  teamStats[a].pts += 1;
              }
              teamStats[h].sg = teamStats[h].gf - teamStats[h].gc;
              teamStats[a].sg = teamStats[a].gf - teamStats[a].gc;
          }
      });

      const sortedTable = Object.values(teamStats).sort((a, b) => 
          b.pts - a.pts || b.sg - a.sg || b.v - a.v
      );
      
      sortedTable.forEach((team, index) => team.rank = index + 1); // Atribui o rank
      allStandings[groupLetter] = { group: groupLetter, table: sortedTable };
  });
  return Object.values(allStandings);
}

async function renderMatchList() {
const matches = await getMatches();

let matchesByDate = {};
matches.forEach(m => {
  const dateKey = m.d; // Ex: '17/06'
  if (!matchesByDate[dateKey]) {
    matchesByDate[dateKey] = [];
  }
  matchesByDate[dateKey].push(m);
});

let html = '';
for (const dateKey of Object.keys(matchesByDate).sort((a, b) => {
  // Ordena as chaves de data (DD/MM) como MM/DD para comparação
  const [dA, mA] = a.split('/');
  const [dB, mB] = b.split('/');
  return new Date(`2026-${mA}-${dA}`) - new Date(`2026-${mB}-${dB}`);
})) {
  const matchesOfDay = matchesByDate[dateKey];
  const isToday = dateKey === getCurrentDateFormatted();

  html += `
    <div class="date-sep fadein">
      <span style="${isToday ? 'color:#F5C842;' : ''}">${isToday ? '● ' : ''}DATA: ${dateKey}</span>
      <div class="dsline"></div>
    </div>
  `;

  matchesOfDay.forEach(m => {
    const isLive = m.status === 'LIVE';
    const isDone = m.status === 'FT';
    const scoreHtml = (isLive || isDone) ? 
      `<span class="mi-score">${m.hs !== null ? m.hs : '-'}<span style="font-size:11px;color:#666;">x</span>${m.as !== null ? m.as : '-'}</span>` : 
      `<span class="mi-hour">${m.time}</span>`;
    
    html += `
      <div class="mi fadein ${isLive ? 'live-card' : ''}">
        ${createStatusBadge(m.status, m.time)}
        <div class="mi-team">
          ${getFlag(m.h, 'sm')}
          <span class="mi-name">${m.h}</span>
        </div>
        <div class="mi-mid">
          ${scoreHtml}
        </div>
        <div class="mi-team away">
          <span class="mi-name">${m.a}</span>
          ${getFlag(m.a, 'sm')}
        </div>
      </div>
    `;
  });
}

setHtml('pi-jogos', `<div class="sech"><h2>Todos os Jogos</h2><div class="line"></div></div>${html}`);
}

async function renderGroups() {

let groupsHtml = '';
Object.keys(GROUPS_DATA).forEach(groupLetter => {
  const teamsInGroup = GROUPS_DATA[groupLetter];
  
  // Encontra os dados de classificação para este grupo específico
  const groupStandings = standings.find(s => s.group === groupLetter);

  let teamsHtml = '';
  if (groupStandings) {
      groupStandings.table.forEach(team => {
          teamsHtml += `
              <div class="gc-team">
                  ${getFlag(team.name, 'sm')}
                  <span>${team.name}</span>
              </div>
          `;
      });
  } else {
      // Fallback para times estáticos se não houver dados de classificação da API para o grupo
      teamsHtml = teamsInGroup.map(teamName => `
          <div class="gc-team">
              ${getFlag(teamName, 'sm')}

          </div>
      `).join('');

  groupsHtml += `
    <div class="gc fadein">
        <div class="gc-title">GRUPO ${groupLetter}</div>

  `;
});

setHtml('pi-grupos', `<div class="sech"><h2>Grupos</h2><div class="line"></div></div><div class="groups-grid">${groupsHtml}</div>`);
}

async function renderStandings() {
const standings = await getStandings();

let standingsGridHtml = '';
// Garante a ordem dos grupos (A, B, C...)
const sortedGroupLetters = Object.keys(GROUPS_DATA).sort();

sortedGroupLetters.forEach(groupLetter => {
  const groupStandings = standings.find(s => s.group === groupLetter);

  if (!groupStandings) {
    // Se não houver dados da API para o grupo, exibe um card vazio ou de fallback
    standingsGridHtml += `<div class="std-card fadein">
        <div class="std-hd">GRUPO ${groupLetter}</div>
        <div style="padding:10px;text-align:center;font-size:11px;color:#888;">Sem dados de classificação.</div>
      </div>`;
    return;
  }

  const tableRows = groupStandings.table.map((team, index) => {
    const posClass = index === 0 ? 'p1' : (index === 1 ? 'p2' : 'px');
    const ptsClass = index < 2 ? 'pts-val' : 'pts-dim';
    const sgColor = team.sg > 0 ? 'color:#2ECC71;' : (team.sg < 0 ? 'color:#E74C3C;' : '');
    
    return `
      <tr class="${posClass.replace('px', '')}">
        <td><span class="pos ${posClass}">${team.rank}</span></td>
        <td>${getFlag(team.name, 'sm')} ${team.name}</td>
        <td>${team.j}</td>
        <td>${team.v}</td>
        <td>${team.e}</td>
        <td>${team.d}</td>
        <td class="${ptsClass}">${team.pts}</td>
        <td style="${sgColor}">${team.sg}</td>
      </tr>
    `;
  }).join('');

  standingsGridHtml += `
    <div class="std-card fadein">
        <div class="std-hd">GRUPO ${groupLetter}</div>
        <div style="overflow-x:auto;">
            <table class="std-tbl">
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>SELEÇÃO</th>
                        <th>J</th>
                        <th>V</th>
                        <th>E</th>
                        <th>D</th>
                        <th>PTS</th>
                        <th>SG</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableRows}
                </tbody>
            </table>
        </div>
    </div>
  `;
});

setHtml('pi-classif', `<div class="sech"><h2>Classificação</h2><div class="line"></div></div><div class="std-grid">${standingsGridHtml}</div>`);
}

// ═══════════════════════════════════════════════════
// 6. FUNÇÕES DE CONTROLE GERAL
// ═══════════════════════════════════════════════════

async function updateDashboardData() {
// Atualiza a data no header
setText('hdr-date', getCurrentDateFormatted());

// Busca todos os jogos (o parâmetro `date: 'all'` não é suportado por API Sports, então busca sem data para temporada)
// ou busca os jogos "ao vivo" para atualizar o contador mais rapidamente.
let fetchedMatches;
try {
  fetchedMatches = await getMatches(); // Busca todos os jogos da temporada/liga
} catch (error) {
  fetchedMatches = FALLBACK_RESULTS; // Usa fallback se a API falhar
}
CURRENT_MATCHES = fetchedMatches;

// Atualiza o contador de jogos ao vivo no header
LIVE_MATCH_COUNT = CURRENT_MATCHES.filter(m => m.status === 'LIVE').length;
const liveHdWrap = document.getElementById('live-hd-wrap');
if (liveHdWrap) { // Verifica se o elemento existe
  if (LIVE_MATCH_COUNT > 0) {
    liveHdWrap.style.display = 'flex';
    setText('live-hd-count', `${LIVE_MATCH_COUNT} AO VIVO`);
  } else {
    liveHdWrap.style.display = 'none';
  }
}


// Atualiza as standings e scorers globalmente (para evitar múltiplas requisições em cada renderPanelContent)
try {
  CURRENT_STANDINGS = await getStandings();
} catch (error) {
  CURRENT_STANDINGS = generateStandingsFromMatches(FALLBACK_RESULTS);
}

try {
  CURRENT_SCORERS = await getScorers();
} catch (error) {
  CURRENT_SCORERS = FALLBACK_SCORERS;
}

// Renderiza o conteúdo do painel ativo
renderPanelContent(activePanelId);
}

window.onload = async () => {
// Não precisamos mais carregar API_KEY do localStorage aqui, pois ela está hardcoded.
// Mas mantemos a lógica para LEAGUE_ID e SEASON caso o usuário edite o HTML.
const storedLeagueId = localStorage.getItem(STORAGE_KEY_LEAGUE_ID);
if (storedLeagueId) LEAGUE_ID = storedLeagueId;
const storedSeason = localStorage.getItem(STORAGE_KEY_SEASON);
if (storedSeason) SEASON = storedSeason;

// Inicia o dashboard buscando os dados
await updateDashboardData();

// Inicia o polling para atualizar partidas ao vivo a cada 15 segundos
setInterval(updateDashboardData, 15000); // A cada 15 segundos
};
